<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão Financeira</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0eb;color:#1a1a1a;min-height:100vh;padding:16px}
h1{font-size:18px;font-weight:700;margin-bottom:14px;color:#1a1a1a}
.layout{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start}
.left{min-width:0}
.right{display:flex;flex-direction:column;gap:14px}
.card{background:#fff;border-radius:12px;padding:16px;border:1px solid #e8e8e2}
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:4px 11px;border-radius:7px;border:1px solid #ddd;background:transparent;cursor:pointer;font-size:11px;color:#666;transition:all .15s}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.tab:hover:not(.active){background:#f5f5f0}
.alert-neg{background:#fff0f0;color:#c0392b;border-radius:8px;padding:7px 11px;font-size:12px;margin-bottom:10px;border:1px solid #fcc}
.alert-pos{background:#f0fff4;color:#1a6b3c;border-radius:8px;padding:7px 11px;font-size:12px;margin-bottom:10px;border:1px solid #b2dfcc}
.caixa-input{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.caixa-input label{font-size:12px;color:#888;white-space:nowrap}
.caixa-input input{font-size:13px;padding:4px 8px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#1a1a1a;width:130px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.metric{background:#f7f7f2;border-radius:8px;padding:10px 12px}
.mlabel{font-size:11px;color:#888;margin-bottom:3px}
.mval{font-size:16px;font-weight:700}
.pos{color:#1a6b3c}.neg{color:#c0392b}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:6px;font-size:11px;color:#888}
.legend span{display:flex;align-items:center;gap:4px}
.ldot{width:9px;height:9px;border-radius:2px;display:inline-block}
.chart-wrap{position:relative;width:100%;height:180px;margin-bottom:14px}
.stitle{font-size:11px;font-weight:700;color:#888;margin:14px 0 6px;text-transform:uppercase;letter-spacing:.05em;display:flex;justify-content:space-between;align-items:center}
.row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;font-size:13px;border-bottom:1px solid #f0f0eb}
.row:last-child{border-bottom:none}
.badge{font-size:10px;padding:2px 6px;border-radius:20px;margin:0 6px;flex-shrink:0}
.bf{background:#e8f4fd;color:#1565a0}.bv{background:#fff8e1;color:#8a6200}
.pago-btn{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;margin-left:6px;flex-shrink:0;cursor:pointer;border:none;font-weight:700}
.ps{background:#e8f5e9;color:#1a6b3c}.pn{background:#ffebee;color:#c0392b}
.del{background:none;border:none;cursor:pointer;color:#ccc;font-size:15px;margin-left:4px;padding:0 2px;line-height:1;transition:color .15s}
.del:hover{color:#c0392b}
.toggle-form{font-size:10px;padding:3px 9px;border-radius:7px;border:1px solid #ddd;background:transparent;cursor:pointer;color:#666}
.toggle-form:hover{background:#f5f5f0}
.add-form{border:1px solid #e8e8e2;border-radius:8px;padding:10px;margin-top:6px;background:#fafaf8}
.add-form input,.add-form select{font-size:12px;padding:5px 8px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#1a1a1a;width:100%;margin-bottom:6px}
.row-inputs{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.btn-cancel{font-size:11px;padding:5px 12px;border-radius:7px;border:1px solid #ddd;background:transparent;cursor:pointer;color:#666}
.btn-save{font-size:11px;padding:5px 14px;border-radius:7px;border:1px solid #1a6b3c;background:#e8f5e9;cursor:pointer;color:#1a6b3c;font-weight:700}
.total-row{font-weight:700;background:#fafaf8;border-radius:0 0 8px 8px}
.card-title{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:12px}
.anual-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.anual-metric{background:#f7f7f2;border-radius:8px;padding:10px 12px}
.anual-metric .mlabel{font-size:11px;color:#888;margin-bottom:3px}
.anual-metric .mval{font-size:15px;font-weight:700}
.rank-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f0f0eb;font-size:12px}
.rank-row:last-child{border-bottom:none}
.rank-num{font-size:10px;font-weight:700;color:#888;width:16px;flex-shrink:0}
.rank-name{flex:1;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-bar-wrap{width:80px;height:6px;background:#f0f0eb;border-radius:3px;flex-shrink:0}
.rank-bar{height:6px;border-radius:3px;background:#D85A30}
.rank-val{font-weight:700;color:#c0392b;min-width:70px;text-align:right;font-size:11px}
.anual-fonte-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #f0f0eb}
.anual-fonte-row:last-child{border-bottom:none}
.save-indicator{font-size:10px;color:#1a6b3c;margin-left:8px;opacity:0;transition:opacity .3s}
.save-indicator.show{opacity:1}
@media(max-width:800px){.layout{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<h1>Gestão Financeira <span id="save-ind" class="save-indicator">✓ Salvo</span></h1>

<div class="layout">
  <div class="left">
    <div class="card">
      <div class="tabs" id="tabs"></div>
      <div id="alert-box"></div>
      <div class="caixa-input">
        <label>Caixa mensal (R$):</label>
        <input type="number" id="caixa-edit" step="0.01" onchange="updateCaixa(this.value)">
      </div>
      <div class="metrics" id="metrics"></div>
      <div class="legend">
        <span><span class="ldot" style="background:#1D9E75"></span>Caixa</span>
        <span><span class="ldot" style="background:#D85A30"></span>Despesas</span>
        <span><span class="ldot" style="background:#378ADD"></span>Saldo</span>
      </div>
      <div class="chart-wrap"><canvas id="barChart" role="img" aria-label="Gráfico mensal">Comparativo mensal.</canvas></div>
      <div id="receitas-section"></div>
      <div id="despesas-section"></div>
    </div>
  </div>

  <div class="right">
    <div class="card">
      <div class="card-title">Resumo anual</div>
      <div class="anual-grid" id="anual-metrics"></div>
      <div class="stitle" style="margin-top:4px">Receita por fonte</div>
      <div id="anual-fontes"></div>
      <div class="chart-wrap" style="height:150px;margin-top:10px">
        <canvas id="pieChart" role="img" aria-label="Gráfico de despesas fixas vs variáveis">Despesas fixas vs variáveis.</canvas>
      </div>
      <div class="legend" id="pie-legend" style="justify-content:center;margin-top:6px"></div>
    </div>

    <div class="card">
      <div class="card-title">Ranking de despesas</div>
      <div id="ranking"></div>
    </div>
  </div>
</div>

const STORAGE_KEY='financeiro_data_v1';

function loadData(){
  try{
    const saved=localStorage.getItem(STORAGE_KEY);
    if(saved) return JSON.parse(saved);
  }catch(e){}
  return cp(DEFAULT_DATA);
}

function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify(DATA));
    const ind=document.getElementById('save-ind');
    ind.classList.add('show');
    setTimeout(()=>ind.classList.remove('show'),1500);
  }catch(e){}
}

const DATA=loadData();
const meses=Object.keys(DEFAULT_DATA);
let mes="Março";
let barChart=null;
let pieChart=null;
let showAddRec=false;
let showAddDesp=false;

function fmt(v){return'R$ '+parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtK(v){return v>=1000?'R$'+(v/1000).toFixed(1)+'k':'R$'+Math.round(v)}

function renderTabs(){
  document.getElementById('tabs').innerHTML=meses.map(m=>`<button class="tab${m===mes?' active':''}" onclick="selMes('${m}')">${m.substring(0,3)}</button>`).join('');
}

function selMes(m){mes=m;showAddRec=false;showAddDesp=false;render()}

function updateCaixa(v){DATA[mes].caixa=parseFloat(v)||0;saveData();renderMetrics();renderBarChart();renderAnual();renderRanking()}

function togglePago(i){DATA[mes].despesas[i].pago=!DATA[mes].despesas[i].pago;saveData();render()}

function delReceita(i){DATA[mes].receitas.splice(i,1);saveData();render()}
function delDespesa(i){DATA[mes].despesas.splice(i,1);saveData();render()}

function addReceita(){
  const n=document.getElementById('rn').value.trim();
  const v=parseFloat(document.getElementById('rv').value);
  if(!n||isNaN(v)||v<=0)return;
  DATA[mes].receitas.push({nome:n,valor:v});
  showAddRec=false;saveData();render();
}

function addDespesa(){
  const n=document.getElementById('dn').value.trim();
  const v=parseFloat(document.getElementById('dv').value);
  const t=document.getElementById('dt').value;
  if(!n||isNaN(v)||v<=0)return;
  DATA[mes].despesas.push({nome:n,valor:v,tipo:t,pago:false});
  showAddDesp=false;saveData();render();
}

function renderMetrics(){
  const d=DATA[mes];
  const td=d.despesas.reduce((s,x)=>s+x.valor,0);
  const saldo=d.caixa-td;
  const pend=d.despesas.filter(x=>!x.pago).reduce((s,x)=>s+x.valor,0);
  const alertEl=document.getElementById('alert-box');
  alertEl.innerHTML=saldo<0
    ?`<div class="alert-neg">Saldo negativo de ${fmt(Math.abs(saldo))} em ${mes}</div>`
    :`<div class="alert-pos">Saldo positivo de ${fmt(saldo)} em ${mes}</div>`;
  document.getElementById('caixa-edit').value=d.caixa;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="mlabel">Caixa</div><div class="mval">${fmt(d.caixa)}</div></div>
    <div class="metric"><div class="mlabel">Despesas</div><div class="mval neg">${fmt(td)}</div></div>
    <div class="metric"><div class="mlabel">Saldo</div><div class="mval ${saldo>=0?'pos':'neg'}">${fmt(saldo)}</div></div>
    <div class="metric"><div class="mlabel">Pendente</div><div class="mval ${pend>0?'neg':'pos'}">${fmt(pend)}</div></div>
  `;
}

function renderReceitas(){
  const d=DATA[mes];
  const tr=d.receitas.reduce((s,x)=>s+x.valor,0);
  document.getElementById('receitas-section').innerHTML=`
    <div class="stitle">Receitas <button class="toggle-form" onclick="showAddRec=!showAddRec;render()">+ adicionar</button></div>
    ${d.receitas.map((r,i)=>`
      <div class="row">
        <span style="flex:1">${r.nome}</span>
        <span style="font-weight:700;color:#1a6b3c">${fmt(r.valor)}</span>
        <button class="del" onclick="delReceita(${i})">×</button>
      </div>`).join('')}
    <div class="row total-row"><span>Total receitas</span><span style="color:#1a6b3c">${fmt(tr)}</span></div>
    ${showAddRec?`<div class="add-form">
      <div class="row-inputs">
        <input id="rn" type="text" placeholder="Nome da receita">
        <input id="rv" type="number" placeholder="Valor (R$)" step="0.01" min="0">
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn-cancel" onclick="showAddRec=false;render()">Cancelar</button>
        <button class="btn-save" onclick="addReceita()">Salvar</button>
      </div>
    </div>`:''}
  `;
}

function renderDespesas(){

  const td=d.despesas.reduce((s,x)=>s+x.valor,0);
  document.getElementById('despesas-section').innerHTML=`
    <div class="stitle">Despesas <button class="toggle-form" onclick="showAddDesp=!showAddDesp;render()">+ adicionar</button></div>
    ${d.despesas.map((r,i)=>`
      <div class="row">
        <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px">${r.nome}</span>
        <span class="badge ${r.tipo==='fixa'?'bf':'bv'}">${r.tipo}</span>
        <span style="font-weight:700;min-width:75px;text-align:right">${fmt(r.valor)}</span>
        <button class="pago-btn ${r.pago?'ps':'pn'}" onclick="togglePago(${i})">${r.pago?'✓':'!'}</button>
        <button class="del" onclick="delDespesa(${i})">×</button>
      </div>`).join('')}
    <div class="row total-row"><span>Total despesas</span><span style="color:#c0392b">${fmt(td)}</span></div>
    ${showAddDesp?`<div class="add-form">
      <div class="row-inputs">
        <input id="dn" type="text" placeholder="Nome da despesa">
        <input id="dv" type="number" placeholder="Valor (R$)" step="0.01" min="0">
      </div>
      <select id="dt"><option value="fixa">Fixa</option><option value="variável">Variável</option></select>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
        <button class="btn-cancel" onclick="showAddDesp=false;render()">Cancelar</button>
        <button class="btn-save" onclick="addDespesa()">Salvar</button>
      </div>
    </div>`:''}
  `;
}

function renderBarChart(){
  const despesas=meses.map(m=>parseFloat(DATA[m].despesas.reduce((s,x)=>s+x.valor,0).toFixed(2)));
  const caixas=meses.map(m=>DATA[m].caixa);
  const saldos=meses.map(m=>parseFloat((DATA[m].caixa-DATA[m].despesas.reduce((s,x)=>s+x.valor,0)).toFixed(2)));
  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{
      labels:meses.map(m=>m.substring(0,3)),
      datasets:[
        {label:'Caixa',data:caixas,backgroundColor:'#1D9E75',borderRadius:3},
        {label:'Despesas',data:despesas,backgroundColor:'#D85A30',borderRadius:3},
        {label:'Saldo',data:saldos,type:'line',borderColor:'#378ADD',backgroundColor:'#378ADD',pointBackgroundColor:'#378ADD',fill:false,tension:0.3,borderDash:[4,3],pointRadius:3}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.raw)}}},
      scales:{
        x:{ticks:{font:{size:10},autoSkip:false,maxRotation:0},grid:{display:false}},
        y:{ticks:{font:{size:10},callback:v=>fmtK(v)},grid:{color:'rgba(0,0,0,0.04)'}}
      }
    }
  });
}

function renderAnual(){
  let totalRec=0,totalDesp=0,totalCaixa=0;
  const fontes={};
  let totalFixa=0,totalVar=0;

  meses.forEach(m=>{
    const d=DATA[m];
    const tr=d.receitas.reduce((s,x)=>s+x.valor,0);
    const td=d.despesas.reduce((s,x)=>s+x.valor,0);
    totalRec+=tr;
    totalDesp+=td;
    totalCaixa+=d.caixa;
    d.receitas.forEach(r=>{fontes[r.nome]=(fontes[r.nome]||0)+r.valor});
    d.despesas.forEach(r=>{
      if(r.tipo==='fixa')totalFixa+=r.valor;
      else totalVar+=r.valor;
    });
  });

  const saldoAnual=totalCaixa-totalDesp;

  document.getElementById('anual-metrics').innerHTML=`
    <div class="anual-metric"><div class="mlabel">Faturamento anual</div><div class="mval pos">${fmt(totalRec)}</div></div>
    <div class="anual-metric"><div class="mlabel">Despesas anuais</div><div class="mval neg">${fmt(totalDesp)}</div></div>
    <div class="anual-metric"><div class="mlabel">Caixa total</div><div class="mval">${fmt(totalCaixa)}</div></div>
    <div class="anual-metric"><div class="mlabel">Saldo anual</div><div class="mval ${saldoAnual>=0?'pos':'neg'}">${fmt(saldoAnual)}</div></div>
  `;

  const fontesOrdenadas=Object.entries(fontes).sort((a,b)=>b[1]-a[1]).slice(0,6);
  document.getElementById('anual-fontes').innerHTML=fontesOrdenadas.map(([nome,val])=>`
    <div class="anual-fonte-row">
      <span style="color:#666">${nome}</span>
      <span style="font-weight:700;color:#1a6b3c">${fmt(val)}</span>
    </div>`).join('');

  if(pieChart)pieChart.destroy();
  pieChart=new Chart(document.getElementById('pieChart'),{
    type:'doughnut',
    data:{
      labels:['Fixas','Variáveis'],
      datasets:[{data:[parseFloat(totalFixa.toFixed(2)),parseFloat(totalVar.toFixed(2))],backgroundColor:['#378ADD','#EF9F27'],borderWidth:0}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,cutout:'65%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmt(ctx.raw)}}}
    }
  });

  const total=totalFixa+totalVar;
  document.getElementById('pie-legend').innerHTML=`
    <span style="display:flex;align-items:center;gap:4px"><span class="ldot" style="background:#378ADD"></span>Fixas ${total>0?Math.round(totalFixa/total*100):0}%</span>
    <span style="display:flex;align-items:center;gap:4px"><span class="ldot" style="background:#EF9F27"></span>Variáveis ${total>0?Math.round(totalVar/total*100):0}%</span>
  `;
}

function renderRanking(){
  const acum={};
  meses.forEach(m=>{
    DATA[m].despesas.forEach(d=>{
      acum[d.nome]=(acum[d.nome]||0)+d.valor;
    });
  });
  const sorted=Object.entries(acum).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const max=sorted[0]?sorted[0][1]:1;
  document.getElementById('ranking').innerHTML=sorted.map(([nome,val],i)=>`
    <div class="rank-row">
      <span class="rank-num">${i+1}</span>
      <span class="rank-name" title="${nome}">${nome}</span>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round(val/max*100)}%"></div></div>
      <span class="rank-val">${fmt(val)}</span>
    </div>`).join('');
}

function render(){
  renderTabs();
  renderMetrics();
  renderBarChart();
  renderReceitas();
  renderDespesas();
  renderAnual();
  renderRanking();
}

render();
</script>
</body>
</html>
